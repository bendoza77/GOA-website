<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#030603" />
    <meta
      name="description"
      content="Goal-Oriented Academy — enter a living digital world. One continuous journey through the courses, the story and the community engineering the next generation of developers."
    />
    <meta property="og:title" content="Goal-Oriented Academy — Enter the world" />
    <meta property="og:description" content="Not a website. A living digital universe. Scroll to travel." />
    <meta property="og:type" content="website" />

    <!-- Fonts — loaded async so the CSS fetch never blocks first paint;
         display=swap shows real text immediately with the fallback stack. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <title>Goal-Oriented Academy — Enter the world</title>

    <!-- The world is dark by design — deep space, green light. -->
    <script>
      document.documentElement.setAttribute("data-theme", "dark");
    </script>

    <!-- Set <html lang> before first paint to match the saved language -->
    <script>
      (function () {
        try {
          var lng = localStorage.getItem("goa-lang");
          document.documentElement.setAttribute("lang", lng === "ka" ? "ka" : "en");
        } catch (e) {
          document.documentElement.setAttribute("lang", "en");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
