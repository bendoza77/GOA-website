<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#030603" />
    <meta
      name="description"
      content="Goal-Oriented Academy — a premium programming academy engineering the next generation of developers. Courses, mentors, community, and real outcomes."
    />
    <meta property="og:title" content="Goal-Oriented Academy — Level up. Ship code. Get hired." />
    <meta property="og:description" content="A modern, immersive programming academy. Learn by building." />
    <meta property="og:type" content="website" />

    <!-- Fonts — loaded async so the CSS fetch never blocks first paint;
         display=swap shows real text immediately with the fallback stack. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Spline scene CDN — warm the TLS handshake early; the .splinecode
         itself is fetched lazily (idle warmup / near-viewport). -->
    <link rel="preconnect" href="https://prod.spline.design" crossorigin />
    <link rel="dns-prefetch" href="https://prod.spline.design" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <title>Goal-Oriented Academy — Engineer your future</title>

    <!-- Set theme before first paint to avoid a flash of the wrong mode -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("goa-theme");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>

    <!-- Set <html lang> before first paint to match the saved language -->
    <script>
      (function () {
        try {
          var lng = localStorage.getItem("goa-lang");
          document.documentElement.setAttribute("lang", lng === "ka" ? "ka" : "en");
        } catch (e) {
          document.documentElement.setAttribute("lang", "en");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
